<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gerador de Placas</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f2f2f2;

    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* CARD CENTRAL */
.container {
    width: 90%;
    max-width: 600px;
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 0 20px rgba(0,0,0,0.15);
}

/* INPUTS */
input, select {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    border: 1px solid #ccc;
    border-radius: 6px;
}

/* BOTÃO */
button {
    width: 100%;
    padding: 12px;
    background: green;
    color: white;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    margin-top: 10px;
}

/* TÍTULOS */
h2, h4 {
    text-align: center;
}
</style>

</head>

<body>

<div class="container">

<h2>GERADOR DE PLACAS</h2>

<form action="/gerar" method="POST">

<select name="qtd">
    <option value="6">6 placas</option>
    <option value="8">8 placas</option>
    <option value="12">12 placas</option>
</select>

<div id="campos"></div>

<button type="submit">GERAR PDF</button>

</form>

</div>

<script>
function gerarCampos() {
    let div = document.getElementById("campos");
    div.innerHTML = "";

    for (let i = 0; i < 12; i++) {
        div.innerHTML += `
            <h4>Placa ${i+1}</h4>
            <input name="produto${i}" placeholder="Produto">
            <input name="marca${i}" placeholder="Marca">
            <input name="preco${i}" placeholder="Preço">
            <input name="peso${i}" placeholder="Peso">
        `;
    }
}

gerarCampos();

// ENTER pula campo
document.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        e.preventDefault();
        let inputs = Array.from(document.querySelectorAll("input"));
        let index = inputs.indexOf(document.activeElement);

        if (index > -1 && index < inputs.length - 1) {
            inputs[index + 1].focus();
        }
    }
});
</script>

</body>
</html>
