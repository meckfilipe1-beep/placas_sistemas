<script>
function gerarCampos(qtd) {
    let div = document.getElementById("campos");
    div.innerHTML = "";

    for (let i = 0; i < qtd; i++) {
        div.innerHTML += `
            <h4>Placa ${i + 1}</h4>
            <input name="produto${i}" placeholder="Produto">
            <input name="marca${i}" placeholder="Marca">
            <input name="preco${i}" placeholder="Preço">
            <input name="peso${i}" placeholder="Peso">
        `;
    }
}

// padrão inicial
gerarCampos(6);

// quando mudar quantidade
document.querySelector("select[name='qtd']").addEventListener("change", function() {
    gerarCampos(parseInt(this.value));
});

// ENTER pula campo
document.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        e.preventDefault();
        let inputs = Array.from(document.querySelectorAll("input"));
        let index = inputs.indexOf(document.activeElement);

        if (index > -1 && index < inputs.length - 1) {
            inputs[index + 1].focus();
        }
    }
});
</script>
